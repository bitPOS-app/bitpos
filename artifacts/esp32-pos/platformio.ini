[env:esp32dev]
platform             = espressif32
board                = esp32dev
framework            = arduino
upload_speed         = 460800
upload_resetmethod   = nodemcu

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  ; XPT2046 touch is on CYD VSPI bus (25/32/39) — separate from display HSPI
  https://github.com/PaulStoffregen/XPT2046_Touchscreen
  https://github.com/bitcoin-ring/Adafruit-PN532-NTAG424.git
  arduino-libraries/Arduino_CRC32 @ ^1.0.0
  bblanchon/ArduinoJson @ ^7.0.0
  h2zero/NimBLE-Arduino @ ^1.4.2
  ricmoo/QRCode @ ^0.0.1

build_flags =
  -DUSER_SETUP_LOADED=1
  ; witnessmenow CYD reference uses ILI9341_2_DRIVER + USE_HSPI_PORT
  -DILI9341_2_DRIVER=1
  -DUSE_HSPI_PORT=1
  ; Display SPI — HSPI bus (GPIO 12/13/14/15)
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  ; Backlight managed by firmware via LEDC PWM — do NOT define TFT_BL here
  ; (TFT_eSPI would fight the LEDC channel for GPIO 21 control)
  ; Touch is on a SEPARATE SPI bus (VSPI: 25/32/39) — handled by
  ; XPT2046_Touchscreen library, NOT TFT_eSPI. No TOUCH_CS here.
  -DSPI_FREQUENCY=55000000
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT6=1
