name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/card-writer/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required for softprops/action-gh-release to create the Release + tag

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set up JDK 17 (required for local Android builds)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK locally
        working-directory: artifacts/card-writer
        run: eas build --platform android --profile preview --non-interactive --local --output ./bitPOS-Card-Writer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: bitPOS Card Writer - build ${{ github.run_number }}
          files: artifacts/card-writer/bitPOS-Card-Writer.apk
          generate_release_notes: true
