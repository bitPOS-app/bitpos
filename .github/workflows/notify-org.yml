name: notify org of deploy

# Fires a repository_dispatch event at bitPOS-app/.github whenever main moves
# or a new tag lands. The org-profile repo listens for `bitpos-deployed` and
# refreshes its "currently in production" verify block within seconds, instead
# of waiting for the hourly cron.
#
# Requires repo secret BITPOS_ORG_DISPATCH_PAT: a fine-grained PAT with
# `contents: write` on bitPOS-app/.github. The default GITHUB_TOKEN cannot
# trigger workflows in another repo, hence the PAT.

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Notify bitPOS-app/.github
        env:
          PAT: ${{ secrets.BITPOS_ORG_DISPATCH_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::warning::BITPOS_ORG_DISPATCH_PAT not set; skipping (org README will refresh on next hourly cron)"
            exit 0
          fi

          HTTP=$(curl -s -o /tmp/dispatch.out -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/bitPOS-app/.github/dispatches" \
            -d "{\"event_type\":\"bitpos-deployed\",\"client_payload\":{\"sha\":\"${GITHUB_SHA}\",\"ref\":\"${GITHUB_REF}\"}}")

          if [ "$HTTP" = "204" ]; then
            echo "::notice::Dispatched bitpos-deployed to bitPOS-app/.github (sha=${GITHUB_SHA:0:7} ref=${GITHUB_REF})"
          else
            echo "::error::Dispatch failed HTTP $HTTP"
            cat /tmp/dispatch.out
            exit 1
          fi
